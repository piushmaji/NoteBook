<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- ── BOOK: rich violet-to-indigo ── -->
    <linearGradient id="book_face" x1="420" y1="180" x2="780" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9D6FFF"/>
      <stop offset="55%"  stop-color="#6C3FD6"/>
      <stop offset="100%" stop-color="#3B1D8A"/>
    </linearGradient>

    <!-- Book left spine (darker) -->
    <linearGradient id="book_spine" x1="390" y1="190" x2="440" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5230AA"/>
      <stop offset="100%" stop-color="#2A1070"/>
    </linearGradient>

    <!-- Book top bevel highlight -->
    <linearGradient id="book_bevel" x1="420" y1="180" x2="780" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C4A0FF"/>
      <stop offset="100%" stop-color="#7B4FD8"/>
    </linearGradient>

    <!-- Gloss overlay on book face -->
    <linearGradient id="book_gloss" x1="420" y1="180" x2="600" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Neon accent gradient for lines -->
    <linearGradient id="line1_grad" x1="480" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="line2_grad" x1="480" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="line3_grad" x1="480" y1="0" x2="720" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B2FF59"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>

    <!-- Pencil: sleek cool-violet body -->
    <linearGradient id="pencil_left" x1="310" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D4BBFF"/>
      <stop offset="40%"  stop-color="#9E78E0"/>
      <stop offset="100%" stop-color="#6B44C0"/>
    </linearGradient>
    <linearGradient id="pencil_len" x1="355" y1="310" x2="355" y2="870" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C8ADFF"/>
      <stop offset="50%"  stop-color="#8A60CC"/>
      <stop offset="100%" stop-color="#5530A0"/>
    </linearGradient>

    <!-- Pencil wood sharpened zone -->
    <linearGradient id="wood_grad" x1="355" y1="790" x2="355" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E8C87A"/>
      <stop offset="100%" stop-color="#B88A3A"/>
    </linearGradient>

    <!-- Pencil graphite tip -->
    <linearGradient id="graphite" x1="355" y1="870" x2="355" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7755BB"/>
      <stop offset="100%" stop-color="#080018"/>
    </linearGradient>

    <!-- Clip body gradient -->
    <linearGradient id="clip_body" x1="285" y1="145" x2="370" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C0A0F8"/>
      <stop offset="100%" stop-color="#5530A8"/>
    </linearGradient>

    <!-- ── FILTERS ── -->
    <!-- Main book shadow -->
    <filter id="f_book" x="-20%" y="-18%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="36" flood-color="#1A006A" flood-opacity="0.55"/>
    </filter>
    <!-- Pencil shadow -->
    <filter id="f_pencil" x="-40%" y="-8%" width="210%" height="140%">
      <feDropShadow dx="-8" dy="16" stdDeviation="18" flood-color="#0D0040" flood-opacity="0.45"/>
    </filter>
    <!-- Clip shadow -->
    <filter id="f_clip" x="-40%" y="-8%" width="220%" height="145%">
      <feDropShadow dx="-6" dy="12" stdDeviation="14" flood-color="#0D0040" flood-opacity="0.40"/>
    </filter>
    <!-- Neon line glow -->
    <filter id="f_glow" x="-20%" y="-120%" width="140%" height="340%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Eraser soft glow -->
    <filter id="f_eraser">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#E040FB" flood-opacity="0.6"/>
    </filter>

    <!-- Clip path so gloss stays inside book -->
    <clipPath id="book_clip">
      <path d="M430 188 L730 188 Q790 188 790 248 L790 760 Q790 820 730 820 L490 820 L430 755 Z"/>
    </clipPath>

  </defs>

  <!-- ══════════════════════════════════════════
       BOOK
  ══════════════════════════════════════════ -->

  <!-- Drop shadow layer -->
  <g filter="url(#f_book)">
    <path d="M430 188 L730 188 Q790 188 790 248 L790 760 Q790 820 730 820 L490 820 L430 755 Z"
          fill="url(#book_face)"/>
  </g>

  <!-- Face -->
  <path d="M430 188 L730 188 Q790 188 790 248 L790 760 Q790 820 730 820 L490 820 L430 755 Z"
        fill="url(#book_face)"/>

  <!-- Gloss sheen clipped to book -->
  <g clip-path="url(#book_clip)">
    <path d="M430 188 L790 188 L790 460 Q680 300 430 310 Z"
          fill="url(#book_gloss)"/>
  </g>

  <!-- Spine strip (left edge) -->
  <path d="M430 188 L430 755 L490 820 L490 188 Z" fill="url(#book_spine)"/>

  <!-- Spine inner highlight line -->
  <line x1="490" y1="196" x2="490" y2="812" stroke="white" stroke-opacity="0.13" stroke-width="2"/>

  <!-- Top bevel edge -->
  <rect x="430" y="188" width="360" height="10" rx="5" fill="url(#book_bevel)" fill-opacity="0.5"/>

  <!-- Bottom-left fold / tail -->
  <path d="M490 820 L430 755 L430 820 Z" fill="#1E0860" fill-opacity="0.55"/>

  <!-- ── NEON RULED LINES ── -->
  <!-- Line 1 – magenta -->
  <rect x="528" y="356" width="218" height="13" rx="6.5"
        fill="url(#line1_grad)" fill-opacity="0.80" filter="url(#f_glow)"/>
  <!-- Line 2 – cyan -->
  <rect x="528" y="414" width="218" height="13" rx="6.5"
        fill="url(#line2_grad)" fill-opacity="0.80" filter="url(#f_glow)"/>
  <!-- Line 3 – lime -->
  <rect x="528" y="472" width="168" height="13" rx="6.5"
        fill="url(#line3_grad)" fill-opacity="0.75" filter="url(#f_glow)"/>

  <!-- ══════════════════════════════════════════
       PENCIL
  ══════════════════════════════════════════ -->
  <g filter="url(#f_pencil)">

    <!-- Main hexagonal body — approximated as tapered rect with side faces -->
    <!-- Left face (lighter) -->
    <polygon points="310,375 335,365 335,805 310,818" fill="#BEA4F0"/>
    <!-- Front face (main) -->
    <polygon points="335,365 378,365 378,805 335,805" fill="url(#pencil_len)"/>
    <!-- Right face (darker) -->
    <polygon points="378,365 400,375 400,818 378,805" fill="#5030A0"/>

    <!-- Center sheen on front face -->
    <line x1="356" y1="368" x2="356" y2="802" stroke="white" stroke-opacity="0.22" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Ferrule (metal band) -->
    <rect x="308" y="388" width="94" height="18" rx="4" fill="#8A68CC"/>
    <rect x="308" y="388" width="94" height="7"  rx="3" fill="white" fill-opacity="0.20"/>
    <rect x="308" y="397" width="94" height="9"  rx="3" fill="#3A1A80" fill-opacity="0.30"/>

    <!-- Eraser cap with neon glow -->
    <rect x="308" y="356" width="94" height="36" rx="14" fill="#E040FB" filter="url(#f_eraser)"/>
    <rect x="308" y="356" width="94" height="36" rx="14" fill="#EE6BFF"/>
    <rect x="313" y="359" width="84" height="14" rx="7"  fill="white" fill-opacity="0.32"/>
    <!-- Eraser label stripe -->
    <rect x="320" y="378" width="70" height="5" rx="2.5" fill="#C020D8" fill-opacity="0.55"/>

    <!-- Pencil body grain (subtle) -->
    <line x1="322" y1="415" x2="322" y2="800" stroke="#3A1880" stroke-opacity="0.18" stroke-width="1.5"/>
    <line x1="390" y1="415" x2="390" y2="800" stroke="#3A1880" stroke-opacity="0.18" stroke-width="1.5"/>

    <!-- Sharpened wood cone -->
    <polygon points="310,800 355,920 400,800" fill="url(#wood_grad)"/>
    <!-- Wood edge lines on cone -->
    <line x1="318" y1="806" x2="355" y2="914" stroke="#906028" stroke-opacity="0.50" stroke-width="1.8"/>
    <line x1="392" y1="806" x2="355" y2="914" stroke="#906028" stroke-opacity="0.50" stroke-width="1.8"/>
    <!-- Wood sheen -->
    <line x1="328" y1="803" x2="350" y2="912" stroke="#F0D898" stroke-opacity="0.30" stroke-width="2"/>

    <!-- Graphite tip -->
    <polygon points="344,897 355,932 366,897" fill="url(#graphite)"/>
    <ellipse cx="355" cy="931" rx="5" ry="3" fill="#050010"/>

  </g>

  <!-- ══════════════════════════════════════════
       CLIP / CLASP
  ══════════════════════════════════════════ -->
  <g filter="url(#f_clip)">

    <!-- Outer clip body -->
    <path d="
      M272 158
      C260 158 250 168 250 182
      L250 490
      C250 514 266 530 284 536
      L295 543
      L295 492
      C280 488 270 477 270 463
      L270 182
      C270 174 276 168 284 166
      L360 166
      C368 168 374 174 374 182
      L374 214
      L396 214
      L396 182
      C396 168 386 158 372 158
      Z"
      fill="url(#clip_body)"/>

    <!-- Clip inner slot shadow -->
    <path d="M270 190 C270 184 274 180 280 180 L374 180 L374 208 L290 208 C280 208 270 202 270 194 Z"
          fill="#1A0060" fill-opacity="0.42"/>

    <!-- Clip top-left highlight -->
    <path d="M250 186 C250 170 260 160 276 158" stroke="white" stroke-opacity="0.30" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Clip bottom curve -->
    <path d="M250 462 C250 494 270 518 295 530" stroke="white" stroke-opacity="0.18" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Clip right inner wall highlight -->
    <line x1="374" y1="170" x2="374" y2="212" stroke="white" stroke-opacity="0.22" stroke-width="2"/>

  </g>

</svg>